name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@8 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dist
        run: pnpm run build

      - name: Run tests
        run: |
          pnpm exec jest src/index.test.js --runInBand
          pnpm exec jest src/all.test.js --runInBand
          pnpm exec jest dist/index.test.js --runInBand
          pnpm exec jest dist/all.test.js --runInBand

      - name: Publish to npm
        run: npm publish
